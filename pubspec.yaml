name: healix_mobile
description: A new Flutter project for Healix Mobile App.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  cached_network_image: ^3.3.0
  url_launcher: ^6.2.1
  shimmer: ^3.0.0
  share_plus: ^13.1.0
  connectivity_plus: ^7.1.1
  shared_preferences: ^2.5.5
  photo_view: ^0.15.0
  flutter_markdown_plus: ^1.0.7
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.8

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"

flutter_native_splash:
  color: "#FFFFFF"
  image: "assets/icon.png"
  android: true
  ios: true
